<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR MENU ELITE</title>
    <link rel="manifest" href="manifest.json">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #121212; --card: #1e1e1e; --text: #f4f4f4; --font-titoli: 'Playfair Display', serif; }
        
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }

        header { 
            text-align: center; padding: 40px 20px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .logo-testo { font-family: var(--font-titoli); font-size: 2rem; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; }

        .screen { display: none; padding: 20px; animation: fadeIn 0.6s ease-out; }
        .screen.active { display: block; }

        /* MENU CATEGORIES */
        .cat-btn { 
            background: var(--card); border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 0; margin-bottom: 20px; height: 150px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .cat-btn:active { border-color: var(--gold); background: #252525; }
        .cat-btn span { font-family: var(--font-titoli); font-size: 1.5rem; z-index: 2; letter-spacing: 1px; }
        .cat-btn::after { content: ""; position: absolute; width: 40px; height: 1px; background: var(--gold); bottom: 40px; }

        /* ITEMS */
        .item-card { background: var(--card); border-radius: 0; margin-bottom: 40px; border: 1px solid #2a2a2a; }
        .foto-piatto { width: 100%; height: 300px; background-size: cover; background-position: center; position: relative; }
        
        .ar-btn { 
            position: absolute; top: 20px; right: 20px; 
            background: var(--gold); color: #000; border: none; 
            padding: 12px 20px; font-weight: 700; font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 1px;
        }

        model-viewer { width: 100%; height: 100%; position: absolute; }

        .info { padding: 25px; border-top: 1px solid #2a2a2a; }
        .info h3 { font-family: var(--font-titoli); font-size: 1.4rem; margin: 0; font-style: italic; }
        .price { color: var(--gold); font-size: 1.2rem; font-weight: 300; }
        .desc { font-size: 0.85rem; color: #aaa; margin: 15px 0; line-height: 1.6; font-weight: 300; }

        /* NAVIGATION */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-back { background: none; border: 1px solid #444; color: #fff; padding: 8px 20px; font-size: 0.8rem; }
        .filter-chip { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; margin-left: 5px; }
        .filter-chip.active { background: var(--gold); color: #000; }

        /* MODAL INSTALL */
        #install-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-content { border: 1px solid var(--gold); padding: 40px; text-align: center; width: 80%; background: #000; }
        .btn-install { background: var(--gold); color: #000; border: none; padding: 15px 30px; font-weight: 700; width: 100%; margin-top: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="install-modal">
    <div class="modal-content">
        <h2 style="font-family: var(--font-titoli); color: var(--gold);">EXCELLENCE</h2>
        <p id="inst-text" style="font-weight: 300; font-size: 0.9rem;"></p>
        <button class="btn-install" id="btn-pwa-install"></button>
        <button onclick="closeModal()" style="margin-top:20px; background:none; border:none; color:#666; font-size: 0.8rem;">SKIP</button>
    </div>
</div>

<header><h1 class="logo-testo">AR MENU ELITE</h1></header>

<div id="scr-landing" class="screen active">
    <div onclick="renderMenu('food')" class="cat-btn"><span>GOURMET FOOD</span></div>
    <div onclick="renderMenu('drinks')" class="cat-btn"><span>FINE DRINKS</span></div>
</div>

<div id="scr-items" class="screen">
    <div class="nav-bar">
        <button class="btn-back" onclick="location.reload()">BACK</button>
        <div id="filter-container"></div>
    </div>
    <div id="items-list"></div>
</div>

<script src="config.js"></script>
<script>
    let lang = navigator.language.startsWith('es') ? 'es' : 'it';
    let deferredPrompt;

    window.onload = () => {
        if (!localStorage.getItem('pwa_elite_done')) {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault(); deferredPrompt = e;
                document.getElementById('install-modal').style.display = 'flex';
                document.getElementById('inst-text').innerText = UI_TRANSLATIONS[lang].install_desc;
                document.getElementById('btn-pwa-install').innerText = UI_TRANSLATIONS[lang].install;
            });
        }
    };

    function closeModal() { document.getElementById('install-modal').style.display = 'none'; localStorage.setItem('pwa_elite_done', 'true'); }

    document.getElementById('btn-pwa-install').addEventListener('click', async () => {
        if (deferredPrompt) { deferredPrompt.prompt(); }
        closeModal();
    });

    function renderMenu(type, activeFilter = null) {
        const list = document.getElementById('items-list');
        const filters = document.getElementById('filter-container');
        list.innerHTML = ''; filters.innerHTML = '';

        if(type === 'food') {
            filters.innerHTML = `<button class="filter-chip ${activeFilter==='gf'?'active':''}" onclick="renderMenu('food', '${activeFilter==='gf'?null:'gf'}')">GLUTEN FREE</button>`;
        } else {
            filters.innerHTML = `<button class="filter-chip ${activeFilter==='bio'?'active':''}" onclick="renderMenu('drinks', '${activeFilter==='bio'?null:'bio'}')">ORGANIC</button>`;
        }

        MENU_DATA[type].forEach(cat => {
            list.innerHTML += `<div style="color:var(--gold); font-family:var(--font-titoli); font-size:0.8rem; letter-spacing:3px; margin:40px 0 20px 0; text-transform:uppercase; text-align:center;">— ${cat.nome[lang]} —</div>`;
            
            cat.piatti.forEach(p => {
                if(activeFilter === 'gf' && !p.glutenFree) return;
                if(activeFilter === 'bio' && !p.bio) return;

                list.innerHTML += `
                <div class="item-card">
                    <div class="foto-piatto" style="background-image:url('${p.f}')">
                        ${p.m ? `<model-viewer src="${p.m}" ar ar-modes="scene-viewer quick-look webxr" ar-placement="floor" ar-scale="fixed" shadow-intensity="1" exposure="1" environment-image="neutral" reveal="manual"><button slot="ar-button" class="ar-btn">${UI_TRANSLATIONS[lang].ar}</button></model-viewer>` : ''}
                    </div>
                    <div class="info">
                        <div style="display:flex; justify-content:space-between; align-items:baseline;">
                            <h3>${p.n}</h3> <span class="price">${p.p}</span>
                        </div>
                        <p class="desc">${p.d}</p>
                        ${p.a ? `<small style="color:var(--gold); font-size:0.6rem; letter-spacing:1px;">ALLERGENI: ${p.a}</small>` : ''}
                    </div>
                </div>`;
            });
        });
        document.getElementById('scr-landing').classList.remove('active');
        document.getElementById('scr-items').classList.add('active');
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
