<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu AR</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000" id="meta-theme-color">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        :root { --colore-principale: #000; --colore-testo: #1a1a1a; --font-titoli: 'Playfair Display', serif; --font-corpo: 'Poppins', sans-serif; }
        body { font-family: var(--font-corpo); margin: 0; background: #fff; -webkit-tap-highlight-color: transparent; }
        
        /* BLOCCA DESKTOP */
        #desktop-notice { display: none; text-align: center; padding: 50px 20px; height: 100vh; flex-direction: column; justify-content: center; align-items: center; background: #f9f9f9; }
        @media screen and (min-width: 768px) { #app-container { display: none; } #desktop-notice { display: flex; } }

        /* HEADER E NAV */
        header { text-align: center; padding: 20px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: white; z-index: 100; }
        .logo-testo { font-family: var(--font-titoli); font-size: 1.5rem; margin: 0; }
        .screen { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .screen.active { display: block; }

        /* CARDS */
        .btn-macro { height: 160px; border-radius: 15px; margin-bottom: 15px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; color: white; }
        .btn-macro img { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
        .btn-macro span { position: relative; font-family: var(--font-titoli); font-size: 2rem; z-index: 1; }

        .item-card { background: white; border-radius: 20px; margin-bottom: 30px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .foto-piatto { width: 100%; height: 250px; background-size: cover; background-position: center; position: relative; }
        
        /* BOTTONE AR PROFESSIONALE */
        .ar-btn { 
            position: absolute; bottom: 15px; right: 15px; background: rgba(0,0,0,0.7); color: white; 
            border: none; padding: 10px 20px; border-radius: 30px; font-weight: 600; display: flex; align-items: center; gap: 8px;
            backdrop-filter: blur(5px);
        }
        model-viewer { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="desktop-notice">
    <h2>📱 Solo su Smartphone</h2>
    <p>Scansiona il QR Code dal tuo telefono per vedere il menu in Realtà Aumentata.</p>
</div>

<div id="app-container">
    <header id="header-logo"></header>

    <div id="scr-landing" class="screen active">
        <div id="macro-container"></div>
    </div>

    <div id="scr-items" class="screen">
        <div class="back-bar" onclick="location.reload()" style="cursor:pointer; margin-bottom:20px;">← Indietro</div>
        <div id="items-list"></div>
    </div>
</div>

<script src="config.js"></script>
<script>
    let userLang = 'it';

    function init() {
        // Setup Colori e Logo
        document.documentElement.style.setProperty('--colore-principale', APP_CONFIG.colori.principale);
        const header = document.getElementById('header-logo');
        header.innerHTML = APP_CONFIG.tipoLogo === 'testo' ? `<h1 class="logo-testo">${APP_CONFIG.testoLogo}</h1>` : `<img src="${APP_CONFIG.urlLogoImmagine}" style="max-height:50px">`;

        // Render Macro Categorie
        const container = document.getElementById('macro-container');
        ['food', 'drinks'].forEach(type => {
            if(MENU_DATA[type].length > 0) {
                container.innerHTML += `
                    <div class="btn-macro" onclick="showCat('${type}')">
                        <img src="${type === 'food' ? 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=500' : 'https://images.unsplash.com/photo-1470337458703-46ad1756a187?w=500'}">
                        <span>${UI_TRANSLATIONS[userLang][type]}</span>
                    </div>`;
            }
        });
    }

    function showCat(type) {
        const list = document.getElementById('items-list');
        list.innerHTML = '';
        MENU_DATA[type].forEach(cat => {
            cat.piatti.forEach(p => {
                list.innerHTML += `
                    <div class="item-card">
                        <div class="foto-piatto" style="background-image: url('${p.f}')">
                            ${p.m ? `<model-viewer src="${p.m}" ar ar-modes="scene-viewer quick-look" reveal="manual">
                                <button slot="ar-button" class="ar-btn">📦 ${UI_TRANSLATIONS[userLang].ar}</button>
                            </model-viewer>` : ''}
                        </div>
                        <div style="padding:15px">
                            <div style="display:flex; justify-content:space-between"><b>${p.n[userLang]}</b> <span>${p.p}</span></div>
                            <p style="font-size:0.9rem; color:#666">${p.d[userLang]}</p>
                        </div>
                    </div>`;
            });
        });
        document.getElementById('scr-landing').classList.remove('active');
        document.getElementById('scr-items').classList.add('active');
    }

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    window.onload = init;
</script>
</body>
</html>
