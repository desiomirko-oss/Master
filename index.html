<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu AR Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        :root { --colore-principale: #000; --font-titoli: 'Playfair Display', serif; --font-corpo: 'Poppins', sans-serif; }
        body { font-family: var(--font-corpo); margin: 0; background: #fff; color: #1a1a1a; }

        /* MODAL INSTALLAZIONE - Appare solo 1 volta */
        #install-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 1000; display: none; 
            align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .modal-content { 
            background: white; padding: 30px; border-radius: 30px; text-align: center; 
            width: 80%; max-width: 350px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .btn-install { background: #000; color: white; border: none; padding: 15px; border-radius: 50px; width: 100%; font-weight: 600; margin: 15px 0 10px 0; }
        .btn-web { background: none; border: none; color: #666; font-size: 0.85rem; text-decoration: underline; }

        header { text-align: center; padding: 15px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: white; z-index: 100; }
        .logo-testo { font-family: var(--font-titoli); font-size: 1.4rem; margin: 0; }

        .screen { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }

        /* TOP BAR E FILTRI */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
        .back-btn { background: #f0f0f0; padding: 10px 15px; border-radius: 12px; font-weight: 600; font-size: 0.8rem; border: none; }
        .filter-container { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 5px; }
        .filter-btn { border: 1.5px solid #000; background: white; padding: 8px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; white-space: nowrap; }
        .filter-btn.active { background: #000; color: white; }

        /* CARDS */
        .btn-macro { height: 160px; border-radius: 20px; margin-bottom: 20px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .btn-macro img { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
        .btn-macro span { position: relative; color: white; font-family: var(--font-titoli); font-size: 2rem; }

        .item-card { background: white; border-radius: 20px; margin-bottom: 25px; overflow: hidden; border: 1px solid #f0f0f0; box-shadow: 0 5px 15px rgba(0,0,0,0.04); }
        .foto-piatto { width: 100%; height: 280px; position: relative; background-color: #f9f9f9; background-size: cover; background-position: center; }
        
        .ar-btn { 
            position: absolute; bottom: 15px; right: 15px; background: #000; color: white; 
            border: none; padding: 12px 20px; border-radius: 50px; font-weight: 600; font-size: 0.75rem;
            display: flex; align-items: center; gap: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 10;
        }
        model-viewer { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

        .info { padding: 15px; }
        .price { color: var(--colore-principale); font-weight: 700; font-size: 1.1rem; }
        .desc { font-size: 0.85rem; color: #666; margin: 8px 0; line-height: 1.5; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="install-modal">
    <div class="modal-content">
        <h3 style="font-family: var(--font-titoli);">Menu Digitale</h3>
        <p style="font-size: 0.9rem; color: #666;">Vuoi installare l'app sul tuo telefono per una consultazione più veloce?</p>
        <button class="btn-install" id="btn-pwa">INSTALLA ORA</button>
        <button class="btn-web" onclick="closeModal()">Continua nel browser</button>
    </div>
</div>

<div id="app-container">
    <header id="header-logo"></header>

    <div id="scr-landing" class="screen active">
        <div id="macro-container"></div>
    </div>

    <div id="scr-items" class="screen">
        <div class="top-bar">
            <button class="back-btn" onclick="location.reload()">← Home</button>
            <div id="filter-container" class="filter-container"></div>
        </div>
        <div id="items-list"></div>
    </div>
</div>

<script src="config.js"></script>
<script>
    let deferredPrompt;

    // LOGICA MODAL - Appare solo la prima volta
    window.onload = () => {
        init();
        if (!localStorage.getItem('pwa_modal_seen')) {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                document.getElementById('install-modal').style.display = 'flex';
            });
        }
    };

    function closeModal() {
        document.getElementById('install-modal').style.display = 'none';
        localStorage.setItem('pwa_modal_seen', 'true');
    }

    document.getElementById('btn-pwa').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
        }
        closeModal();
    });

    function init() {
        if (typeof APP_CONFIG === 'undefined') return;
        document.documentElement.style.setProperty('--colore-principale', APP_CONFIG.colori.principale);
        const header = document.getElementById('header-logo');
        header.innerHTML = `<h1 class="logo-testo">${APP_CONFIG.testoLogo}</h1>`;

        const container = document.getElementById('macro-container');
        if(MENU_DATA.food.length > 0) {
            container.innerHTML += `<div class="btn-macro" onclick="renderMenu('food')"><img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600"><span>CUCINA</span></div>`;
        }
        if(MENU_DATA.drinks.length > 0) {
            container.innerHTML += `<div class="btn-macro" onclick="renderMenu('drinks')"><img src="https://images.unsplash.com/photo-1470337458703-46ad1756a187?w=600"><span>CANTINA</span></div>`;
        }
    }

    function renderMenu(type, activeFilter = null) {
        const list = document.getElementById('items-list');
        const filterArea = document.getElementById('filter-container');
        list.innerHTML = '';
        filterArea.innerHTML = '';

        // CREAZIONE TASTI FILTRO
        if(type === 'food') {
            filterArea.innerHTML = `<button class="filter-btn ${activeFilter==='gf'?'active':''}" onclick="renderMenu('food', '${activeFilter==='gf'?null:'gf'}')">Gluten Free 🌾</button>`;
        } else {
            filterArea.innerHTML = `
                <button class="filter-btn ${activeFilter==='an'?'active':''}" onclick="renderMenu('drinks', '${activeFilter==='an'?null:'an'}')">Analcolico</button>
                <button class="filter-btn ${activeFilter==='bio'?'active':''}" onclick="renderMenu('drinks', '${activeFilter==='bio'?null:'bio'}')">Bio 🌿</button>
            `;
        }

        MENU_DATA[type].forEach(cat => {
            cat.piatti.forEach(p => {
                // LOGICA FILTRI
                if(activeFilter === 'gf' && !p.glutenFree) return;
                if(activeFilter === 'an' && !p.analcolico) return;
                if(activeFilter === 'bio' && !p.bio) return;

                let html = `<div class="item-card">`;
                
                if(type === 'food') {
                    html += `<div class="foto-piatto" style="background-image: url('${p.f}')">`;
                    if(p.m) {
                        html += `<model-viewer src="${p.m}" ar ar-modes="scene-viewer quick-look webxr" ar-placement="floor" ar-scale="fixed" camera-controls touch-action="none" shadow-intensity="1" reveal="manual">
                                    <button slot="ar-button" class="ar-btn">VEDI SUL TAVOLO 📦</button>
                                 </model-viewer>`;
                    }
                    html += `</div>`;
                }

                html += `<div class="info">
                            <div style="display:flex; justify-content:space-between; align-items:center;"><b>${p.n}</b> <span class="price">${p.p}</span></div>
                            <p class="desc">${p.d}</p>
                            ${p.a ? `<div style="font-size:0.7rem; opacity:0.5">Allergeni: ${p.a}</div>` : ''}
                         </div></div>`;
                list.innerHTML += html;
            });
        });

        document.getElementById('scr-landing').classList.remove('active');
        document.getElementById('scr-items').classList.add('active');
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
