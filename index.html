<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEYS GRILL - AR Digital Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        /* --- CONFIGURAZIONE STILE --- */
        :root {
            --colore-principale: #c5a059;
            --colore-sfondo: #f8f8f8;
            --colore-testo: #1a1a1a;
            --colore-pulsante: #1a1a1a;
            --font-titoli: 'Playfair Display', serif;
            --font-corpo: 'Poppins', sans-serif;
            --dimensione-logo: 2.2rem;
        }

        body { font-family: var(--font-corpo); margin: 0; background: var(--colore-sfondo); color: var(--colore-testo); }
        header { text-align: center; padding: 30px 20px; background: white; border-bottom: 1px solid #ddd; }
        .logo { font-family: var(--font-titoli); font-size: var(--dimensione-logo); text-transform: uppercase; cursor: pointer; letter-spacing: 2px; }

        .screen { display: none; min-height: 100vh; width: 100%; padding: 20px; box-sizing: border-box; }
        .screen.active { display: block; animation: fadeIn 0.4s ease; }

        /* Landing */
        .landing-grid { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; }
        .btn-macro { height: 200px; border-radius: 20px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .btn-macro img { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
        .btn-macro span { position: relative; color: white; font-size: 2.5rem; font-family: var(--font-titoli); z-index: 2; }

        /* Categorie */
        .cat-card { height: 130px; border-radius: 15px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; cursor: pointer; }
        .cat-card img { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        .cat-card span { position: relative; color: white; font-size: 1.7rem; font-family: var(--font-titoli); }

        /* Scheda Piatto */
        .item-card { background: white; border-radius: 20px; margin-bottom: 30px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.08); position: relative; }
        .item-info { padding: 20px; }
        .item-header { display: flex; justify-content: space-between; align-items: baseline; }
        .item-price { color: var(--colore-principale); font-weight: 700; font-size: 1.2rem; }
        .allergens { font-size: 1.2rem; margin: 10px 0; }
        .item-desc { color: #555; font-size: 0.95rem; line-height: 1.5; }

        /* 3D Visualizer */
        model-viewer { width: 100%; height: 400px; background: #fafafa; }
        
        .ar-btn { 
            background: var(--colore-pulsante); color: white; border: none; padding: 18px; 
            font-weight: 700; cursor: pointer; border-radius: 50px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            position: absolute; bottom: 25px; left: 10%; width: 80%; z-index: 10;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }

        .back-bar { padding: 15px; background: #eee; cursor: pointer; font-weight: 600; color: var(--colore-principale); margin-bottom: 10px; border-radius: 10px; display: inline-block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header><h1 class="logo" onclick="location.reload()">MEYS GRILL</h1></header>

<div id="scr-landing" class="screen active">
    <div class="landing-grid">
        <div class="btn-macro" onclick="navToCategories('food')">
            <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600">
            <span>FOOD</span>
        </div>
        <div class="btn-macro" onclick="navToCategories('drinks')">
            <img src="https://images.unsplash.com/photo-1551024709-8f23befc6f87?w=600">
            <span>DRINKS</span>
        </div>
    </div>
</div>

<div id="scr-categories" class="screen">
    <div class="back-bar" onclick="navToLanding()">← HOME</div>
    <div id="cat-list"></div>
</div>

<div id="scr-items" class="screen">
    <div id="back-to-cat" class="back-bar">← CATEGORIE</div>
    <div id="items-list"></div>
</div>

<script>
/* ==========================================
   GESTIONE DATI (MODIFICA QUI)
   ========================================== */
const MENU_DATA = {
    food: [
        { 
            id: "principali", 
            nome: "Platos Principales", 
            foto: "https://images.unsplash.com/photo-1512058560566-427a19db01cc?w=400",
            piatti: [
                { n: "Paella de Marisco", p: "18.50€", d: "Cocinada a leña con marisco fresco de la costa.", a: "🦐, 🐚, 🐟", m: "piatto.glb" },
                { n: "Fideuà de Gandía", p: "16.00€", d: "Pasta corta cotta in brodo intenso di pesce.", a: "🦐, 🐚, 🐟, 🌾", m: "" }
            ]
        }
    ],
    drinks: [
        { 
            id: "vini", nome: "Vini Bianchi", foto: "https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=400",
            piatti: [{ n: "Albariño D.O.", p: "22.00€", d: "Vino fresco Galiziano.", a: "🍷", m: "" }]
        }
    ]
};

/* ==========================================
   MOTORE NAVIGAZIONE & 3D
   ========================================== */
let currentMacro = 'food';

function navToLanding() { switchScreen('scr-landing'); }

function navToCategories(type) {
    currentMacro = type;
    const container = document.getElementById('cat-list');
    container.innerHTML = '';
    MENU_DATA[type].forEach(cat => {
        container.innerHTML += `<div class="cat-card" onclick="navToItems('${cat.id}')"><img src="${cat.foto}"><span>${cat.nome}</span></div>`;
    });
    switchScreen('scr-categories');
}

function navToItems(catId) {
    const catObj = MENU_DATA[currentMacro].find(c => c.id === catId);
    const container = document.getElementById('items-list');
    container.innerHTML = `<h2 style="font-family:var(--font-titoli); font-size:2rem; margin-bottom:20px;">${catObj.nome}</h2>`;
    
    catObj.piatti.forEach(p => {
        let html = `<div class="item-card">`;
        if(p.m) {
            html += `
            <div style="position:relative;">
                <model-viewer src="${p.m}" 
                    ar ar-modes="scene-viewer quick-look webxr" 
                    ar-scale="auto"
                    camera-controls
                    auto-rotate 
                    rotation-per-second="40deg"
                    interaction-prompt="none"
                    style="pointer-events: none;"
                    shadow-intensity="2">
                    <button slot="ar-button" class="ar-btn" style="pointer-events: auto;">🥘 VEDI SUL TUO TAVOLO</button>
                </model-viewer>
            </div>`;
        }
        html += `<div class="item-info">
                    <div class="item-header"><h3 style="margin:0">${p.n}</h3><span class="item-price">${p.p}</span></div>
                    <div class="allergens">${p.a}</div>
                    <p class="item-desc">${p.d}</p>
                 </div></div>`;
        container.innerHTML += html;
    });
    document.getElementById('back-to-cat').onclick = () => navToCategories(currentMacro);
    switchScreen('scr-items');
}

function switchScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
}
</script>
</body>
</html>
