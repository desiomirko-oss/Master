<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu AR - Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        :root {
            --primario: #c5a059;
            --sfondo: #f8f8f8;
            --testo: #1a1a1a;
            --btn-ar: #1a1a1a;
            --font-t: 'Playfair Display', serif;
            --font-c: 'Poppins', sans-serif;
        }

        body { font-family: var(--font-c); margin: 0; background: var(--sfondo); color: var(--testo); -webkit-tap-highlight-color: transparent; }
        header { text-align: center; padding: 25px 20px; background: white; border-bottom: 1px solid #eee; }
        .logo-testo { font-family: var(--font-t); font-size: 2rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .screen { display: none; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .screen.active { display: block; animation: fadeIn 0.4s ease; }

        .grid-flex { display: flex; flex-direction: column; gap: 15px; }
        .card-macro { height: 180px; border-radius: 20px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .card-macro img { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
        .card-macro span { position: relative; color: white; font-size: 2.2rem; font-family: var(--font-t); z-index: 2; }

        /* SCHEDA PIATTO */
        .item-card { background: white; border-radius: 25px; margin-bottom: 30px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        .media-box { width: 100%; height: 320px; position: relative; }
        
        /* IL TRUCCO: Foto sopra, 3D sotto solo per l'AR */
        .foto-piatto { width: 100%; height: 100%; background-size: cover; background-position: center; position: absolute; top:0; left:0; z-index: 1; }
        
        model-viewer { width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 2; --poster-color: transparent; }

        /* Tasto AR sempre visibile e cliccabile */
        .ar-button { 
            background: var(--btn-ar); color: white; border: none; padding: 16px 28px; 
            font-weight: 700; cursor: pointer; border-radius: 50px;
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 10px; z-index: 10;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }

        .info-pasto { padding: 20px; }
        .header-pasto { display: flex; justify-content: space-between; align-items: baseline; }
        .prezzo { color: var(--primario); font-weight: 700; font-size: 1.3rem; }
        .allergens { font-size: 1.1rem; margin: 10px 0; opacity: 0.8; }
        .desc { color: #666; font-size: 0.95rem; line-height: 1.4; }

        .btn-back { padding: 10px 15px; background: #fff; border-radius: 10px; display: inline-block; margin-bottom: 15px; cursor: pointer; font-weight: 600; color: var(--primario); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header><h1 id="brand-name" class="logo-testo"></h1></header>

<div id="scr-landing" class="screen active">
    <div class="grid-flex" id="landing-options"></div>
</div>

<div id="scr-categories" class="screen">
    <div class="btn-back" onclick="showLanding()">← HOME</div>
    <div class="grid-flex" id="cat-list"></div>
</div>

<div id="scr-items" class="screen">
    <div id="back-to-cat-trigger" class="btn-back">← CATEGORIE</div>
    <div id="items-list"></div>
</div>

<script>
const CONFIG = {
    nomeRistorante: "MEYS GRILL",
    colori: { primario: "#c5a059", bottoneAR: "#1a1a1a" },
    menu: {
        food: {
            label: "FOOD",
            img: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600",
            categorie: [
                {
                    id: "cat1",
                    nome: "Principales",
                    foto: "https://images.unsplash.com/photo-1512058560566-427a19db01cc?w=400",
                    piatti: [
                        { 
                            nome: "Paella de Marisco", 
                            prezzo: "18.50€", 
                            desc: "Ricetta tradizionale con pesce fresco.", 
                            allergie: "🦐 🐚 🐟", 
                            fotoPiatto: "https://images.unsplash.com/photo-1534080564583-6be75777b70a?w=600", 
                            modello3d: "piatto.glb" 
                        }
                    ]
                }
            ]
        },
        drinks: {
            label: "DRINKS",
            img: "https://images.unsplash.com/photo-1551024709-8f23befc6f87?w=600",
            categorie: [
                {
                    id: "cat2",
                    nome: "Vini",
                    foto: "https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=400",
                    piatti: [
                        { nome: "Albariño", prezzo: "22€", desc: "D.O. Rías Baixas.", allergie: "🍷", fotoPiatto: "https://images.unsplash.com/photo-1506377247377-2a5b3b417ebb?w=600", modello3d: "" }
                    ]
                }
            ]
        }
    }
};

function init() {
    document.getElementById('brand-name').innerText = CONFIG.nomeRistorante;
    const l = document.getElementById('landing-options');
    l.innerHTML = '';
    for (let key in CONFIG.menu) {
        l.innerHTML += `<div class="card-macro" onclick="showCategories('${key}')"><img src="${CONFIG.menu[key].img}"><span>${CONFIG.menu[key].label}</span></div>`;
    }
}

function showLanding() { switchScreen('scr-landing'); }

function showCategories(key) {
    activeMacro = key;
    const container = document.getElementById('cat-list');
    container.innerHTML = '';
    CONFIG.menu[key].categorie.forEach(c => {
        container.innerHTML += `<div class="card-macro" style="height:120px;" onclick="showItems('${c.id}')"><img src="${c.foto}"><span>${c.nome}</span></div>`;
    });
    switchScreen('scr-categories');
}

function showItems(catId) {
    const cat = CONFIG.menu[activeMacro].categorie.find(c => c.id === catId);
    const container = document.getElementById('items-list');
    container.innerHTML = `<h2 style="font-family:var(--font-t)">${cat.nome}</h2>`;

    cat.piatti.forEach(p => {
        let card = `<div class="item-card">`;
        card += `<div class="media-box">`;
        
        if(p.modello3d) {
            // Qui usiamo il model-viewer SOLO per il tasto AR. L'anteprima è coperta dalla foto.
            card += `
                <div class="foto-piatto" style="background-image:url('${p.fotoPiatto}')"></div>
                <model-viewer src="${p.modello3d}" ar ar-modes="scene-viewer quick-look webxr" ar-placement="floor" ar-scale="auto">
                    <button slot="ar-button" class="ar-button">🥘 VEDI SUL TAVOLO</button>
                </model-viewer>`;
        } else {
            card += `<div class="foto-piatto" style="background-image:url('${p.fotoPiatto}')"></div>`;
        }
        card += `</div>`;

        card += `<div class="info-pasto">
                    <div class="header-pasto"><h3>${p.nome}</h3><span class="prezzo">${p.prezzo}</span></div>
                    <div class="allergens">${p.allergie}</div>
                    <p class="desc">${p.desc}</p>
                 </div></div>`;
        container.innerHTML += card;
    });

    document.getElementById('back-to-cat-trigger').onclick = () => showCategories(activeMacro);
    switchScreen('scr-items');
}

function switchScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
}

init();
</script>
</body>
</html>
