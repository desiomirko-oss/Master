<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR MENU ELITE</title>
    <link rel="manifest" href="manifest.json">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #121212; --card: #1e1e1e; --text: #f4f4f4; --font-titoli: 'Playfair Display', serif; }
        
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); color: var(--text); }

        header { 
            text-align: center; padding: 25px; 
            background: #000; border-bottom: 2px solid var(--gold);
            position: sticky; top: 0; z-index: 100;
        }

        .logo-testo { font-family: var(--font-titoli); font-size: 1.6rem; color: var(--gold); letter-spacing: 2px; }

        .screen { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }

        /* LANDING CARDS */
        .main-nav-card { 
            background: var(--card); border: 1px solid #333; border-radius: 15px; 
            margin-bottom: 20px; height: 140px; display: flex; align-items: center; justify-content: center;
            border-left: 5px solid var(--gold); cursor: pointer;
        }
        .main-nav-card span { font-family: var(--font-titoli); font-size: 1.5rem; color: var(--gold); }

        /* LISTS & CATEGORIES */
        .category-title { 
            font-family: var(--font-titoli); color: var(--gold); 
            margin: 40px 0 20px 0; border-bottom: 1px solid #333; padding-bottom: 5px;
            font-size: 1.4rem; text-transform: capitalize;
        }

        .item-card { background: var(--card); border-radius: 20px; margin-bottom: 30px; overflow: hidden; border: 1px solid #2a2a2a; }
        .foto-piatto { width: 100%; height: 260px; background-size: cover; background-position: center; position: relative; background-color: #222; }
        
        .ar-btn { 
            position: absolute; bottom: 15px; right: 15px; background: var(--gold); color: #000; 
            border: none; padding: 12px 20px; border-radius: 50px; font-weight: 700; font-size: 0.7rem;
        }

        .info { padding: 20px; }
        .info h3 { font-family: var(--font-titoli); margin: 0; font-size: 1.2rem; color: #fff; }
        .price { color: var(--gold); font-weight: 600; font-size: 1.1rem; }
        .desc { font-size: 0.85rem; color: #aaa; margin: 10px 0; line-height: 1.5; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-back { background: #333; border: none; color: white; padding: 10px 15px; border-radius: 10px; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header><h1 class="logo-testo">AR MENU ELITE</h1></header>

<div id="scr-landing" class="screen active">
    <div class="main-nav-card" onclick="renderMenu('food')"><span>CUCINA GOURMET</span></div>
    <div class="main-nav-card" onclick="renderMenu('drinks')"><span>CANTINA ELITE</span></div>
</div>

<div id="scr-items" class="screen">
    <div class="top-bar">
        <button class="btn-back" onclick="location.reload()">← Home</button>
        <div id="filter-container"></div>
    </div>
    <div id="items-list"></div>
</div>

<script src="config.js"></script>
<script>
    let lang = navigator.language.startsWith('es') ? 'es' : 'it';

    function renderMenu(type, activeFilter = null) {
        const list = document.getElementById('items-list');
        const filters = document.getElementById('filter-container');
        list.innerHTML = ''; filters.innerHTML = '';

        // Filtri (opzionali, appaiono solo se cliccati)
        if(type === 'food') {
            filters.innerHTML = `<button onclick="renderMenu('food', 'gf')" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 10px; border-radius:15px; font-size:0.7rem;">Senza Glutine</button>`;
        }

        MENU_DATA[type].forEach(cat => {
            // TITOLO CATEGORIA (Trascritto dalle tue foto)
            list.innerHTML += `<h2 class="category-title">${cat.nome[lang]}</h2>`;
            
            cat.piatti.forEach(p => {
                if(activeFilter === 'gf' && !p.glutenFree) return;

                list.innerHTML += `
                <div class="item-card">
                    <div class="foto-piatto" style="background-image:url('${p.f}')">
                        ${p.m ? `<model-viewer src="${p.m}" ar ar-modes="scene-viewer quick-look webxr" ar-placement="floor" ar-scale="fixed" shadow-intensity="1" exposure="1" environment-image="neutral" reveal="manual"><button slot="ar-button" class="ar-btn">${UI_TRANSLATIONS[lang].ar}</button></model-viewer>` : ''}
                    </div>
                    <div class="info">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <h3>${p.n}</h3> <span class="price">${p.p}</span>
                        </div>
                        <p class="desc">${p.d}</p>
                    </div>
                </div>`;
            });
        });

        document.getElementById('scr-landing').classList.remove('active');
        document.getElementById('scr-items').classList.add('active');
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
